<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>REVERSE THRUST</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    touch-action: none;
  }
  canvas { display: block; }
  #ui {
    position: fixed; top: 0; left: 0; width: 100%;
    pointer-events: none;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 12px 16px;
    z-index: 10;
  }
  .ui-block { color: #f80; font-size: 13px; line-height: 1.8; text-shadow: 0 0 8px #f80; }
  .ui-block span { color: #fff; }
  #driftToggle {
    position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
    background: transparent;
    border: 1px solid #f806;
    color: #f808;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 5px 14px;
    cursor: pointer;
    z-index: 11;
    transition: all 0.2s;
    white-space: nowrap;
  }
  #driftToggle.on {
    background: #f802;
    border-color: #f80;
    color: #f80;
    box-shadow: 0 0 10px #f804;
  }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(5,0,0,0.90);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20; text-align: center; padding: 20px;
  }
  #overlay h1 {
    font-size: clamp(28px, 7vw, 60px);
    font-weight: 900;
    color: #f80;
    text-shadow: 0 0 20px #f80, 0 0 50px #f40;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    line-height: 1.2;
  }
  #overlay .sub {
    color: #fc8;
    font-size: clamp(10px, 2.5vw, 14px);
    letter-spacing: 0.08em;
    margin-bottom: 20px;
    max-width: 420px;
    line-height: 2;
  }
  #overlay .hint {
    color: #a64;
    font-size: clamp(9px, 2vw, 11px);
    letter-spacing: 0.08em;
    margin-bottom: 32px;
    max-width: 380px;
    line-height: 2.2;
  }
  #startBtn {
    background: transparent;
    border: 2px solid #f80;
    color: #f80;
    font-family: 'Orbitron', monospace;
    font-size: clamp(13px, 3vw, 17px);
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 14px 40px;
    cursor: pointer;
    text-shadow: 0 0 8px #f80;
    box-shadow: 0 0 16px #f804, inset 0 0 16px #f801;
    transition: all 0.2s;
  }
  #startBtn:hover, #startBtn:active {
    background: #f802;
    box-shadow: 0 0 30px #f808, inset 0 0 20px #f803;
  }
  #controls {
    position: fixed; bottom: 0; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 16px;
    pointer-events: none;
    z-index: 10;
  }
  .ctrl-hint { color: #f803; font-size: 10px; letter-spacing: 0.1em; line-height: 2; }
  #levelBanner {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #f80;
    font-size: clamp(24px, 6vw, 48px);
    font-weight: 900;
    letter-spacing: 0.2em;
    text-shadow: 0 0 20px #f80;
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div class="ui-block">SCORE<br><span id="scoreVal">0</span></div>
  <div class="ui-block" style="text-align:center">LEVEL<br><span id="levelVal">1</span></div>
  <div class="ui-block" style="text-align:right">LIVES<br><span id="livesVal">★ ★ ★</span></div>
</div>

<button id="driftToggle" onclick="toggleDrift()">DRIFT OFF</button>

<div id="controls">
  <div class="ctrl-hint">◄ ROTATE ►</div>
  <div class="ctrl-hint">THRUST</div>
</div>

<div id="levelBanner">LEVEL 1</div>

<div id="overlay">
  <h1>REVERSE<br>THRUST</h1>
  <div class="sub">
    YOUR ENGINES ARE YOUR WEAPON<br>
    TURN YOUR BACK · FIRE YOUR TAIL<br>
    THE TAIL'S LENGTH IS ITS REACH
  </div>
  <div class="hint">
    ← LEFT HALF → ROTATE SHIP<br>
    RIGHT HALF = THRUST<br>
    KEYBOARD: A/D ROTATE · SPACE THRUST<br>
    ASTEROIDS BEHIND YOU FEEL THE BURN
  </div>
  <button id="startBtn" onclick="startGame()">FIRE UP</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Constants ──────────────────────────────────────────
const SHIP_SIZE         = 14;
const ROTATION_SPEED    = 0.055;
const THRUST_POWER      = 0.08;
const FRICTION          = 0.978;
const MAX_SPEED         = 2.8;
const TAIL_LENGTH       = 80;
const TAIL_KILL_RANGE   = TAIL_LENGTH * 0.85;
const TAIL_PUSH_RANGE   = TAIL_LENGTH * 1.0;
const BULLSEYE_TOL      = 22;
const PUSH_POWER        = 0.45;
const BASE_ASTEROIDS    = 4;
const LIVES_START       = 3;
const RESPAWN_DELAY     = 90;

// ── State ──────────────────────────────────────────────
let ship, asteroids, particles, stars;
let level, score, lives;
let gameRunning = false;
let respawnTimer = 0;
let shipDead = false;
let driftMode = false;   // true = no friction (drift), false = friction
let keys = {};
let touches = {};
let touchLeft = false, touchRight = false, touchRotDir = 0;

function toggleDrift() {
  driftMode = !driftMode;
  const btn = document.getElementById('driftToggle');
  btn.textContent = driftMode ? 'DRIFT ON' : 'DRIFT OFF';
  btn.classList.toggle('on', driftMode);
}

// ── Helpers ────────────────────────────────────────────
function dist(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }
function clampSpeed(obj, max) {
  const s = Math.sqrt(obj.vx**2 + obj.vy**2);
  if (s > max) { obj.vx *= max/s; obj.vy *= max/s; }
}
function bounce(obj, r) {
  if (obj.x - r < 0)  { obj.x = r;     obj.vx = Math.abs(obj.vx); }
  if (obj.x + r > W)  { obj.x = W-r;   obj.vx = -Math.abs(obj.vx); }
  if (obj.y - r < 0)  { obj.y = r;     obj.vy = Math.abs(obj.vy); }
  if (obj.y + r > H)  { obj.y = H-r;   obj.vy = -Math.abs(obj.vy); }
}
function asteroidBounce(a, b) {
  const dx = b.x-a.x, dy = b.y-a.y;
  const d = Math.sqrt(dx*dx+dy*dy);
  if (d === 0) return;
  const nx = dx/d, ny = dy/d;
  const dvx = a.vx-b.vx, dvy = a.vy-b.vy;
  const dot = dvx*nx + dvy*ny;
  if (dot > 0) return;
  a.vx -= dot*nx; a.vy -= dot*ny;
  b.vx += dot*nx; b.vy += dot*ny;
  const overlap = (a.r+b.r-d)/2+1;
  a.x -= nx*overlap; a.y -= ny*overlap;
  b.x += nx*overlap; b.y += ny*overlap;
}

// ── Stars ──────────────────────────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < 180; i++) {
    stars.push({ x: Math.random()*3000, y: Math.random()*3000, r: Math.random()*1.5, b: 0.3+Math.random()*0.7 });
  }
}

// ── Ship ───────────────────────────────────────────────
function makeShip() {
  return { x: W/2, y: H/2, vx: 0, vy: 0, angle: -Math.PI/2, thrusting: false };
}

// ── Asteroids ──────────────────────────────────────────
function makeAsteroid(level) {
  const baseR = SHIP_SIZE * 2.2 * (1 - (level-1)*0.06);
  const r = Math.max(baseR, SHIP_SIZE * 0.8);
  let x, y;
  const edge = Math.floor(Math.random()*4);
  if (edge===0) { x=Math.random()*W; y=-r; }
  else if (edge===1) { x=Math.random()*W; y=H+r; }
  else if (edge===2) { x=-r; y=Math.random()*H; }
  else { x=W+r; y=Math.random()*H; }
  const speed = 0.5 + Math.random()*1.0 + level*0.1;
  const angle = Math.random()*Math.PI*2;
  const verts = [];
  const sides = 7 + Math.floor(Math.random()*4);
  for (let i=0; i<sides; i++) {
    const a = (i/sides)*Math.PI*2;
    const d = r*(0.75+Math.random()*0.5);
    verts.push({ x: Math.cos(a)*d, y: Math.sin(a)*d });
  }
  return { x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, r, verts, hitFlash: 0 };
}

// ── Particles ──────────────────────────────────────────
function spawnExplosion(x, y, color, count) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 0.8+Math.random()*0.6, maxLife: 0.8+Math.random()*0.6,
      color, r: 1+Math.random()*2.5 });
  }
}

function spawnTailParticle(ship) {
  const back = ship.angle + Math.PI;
  const spread = 0.35;
  const pd = Math.random() * TAIL_LENGTH * 0.8;
  const a = back + (Math.random()-0.5)*spread;
  const s = 0.5 + Math.random()*1.5;
  const hue = Math.random() < 0.6 ? '#f80' : Math.random() < 0.5 ? '#ff4' : '#f40';
  particles.push({
    x: ship.x + Math.cos(back)*pd,
    y: ship.y + Math.sin(back)*pd,
    vx: Math.cos(a)*s, vy: Math.sin(a)*s,
    life: 0.4+Math.random()*0.4, maxLife: 0.4+Math.random()*0.4,
    color: hue, r: 1+Math.random()*3
  });
}

// ── Init ───────────────────────────────────────────────
function initLevel(lvl) {
  level = lvl;
  const count = BASE_ASTEROIDS + (lvl-1);
  asteroids = [];
  for (let i=0; i<count; i++) asteroids.push(makeAsteroid(lvl));
  particles = [];
  if (!ship) ship = makeShip();
  const banner = document.getElementById('levelBanner');
  banner.textContent = 'LEVEL ' + lvl;
  banner.style.opacity = '1';
  setTimeout(() => banner.style.opacity = '0', 1200);
  updateUI();
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  score = 0; lives = LIVES_START; level = 1;
  ship = makeShip(); shipDead = false; respawnTimer = 0;
  initStars(); initLevel(1);
  gameRunning = true;
  requestAnimationFrame(loop);
}

// ── Thrust ─────────────────────────────────────────────
function applyThrust() {
  if (shipDead) return;
  const tx = Math.cos(ship.angle), ty = Math.sin(ship.angle);

  ship.vx += tx * THRUST_POWER;
  ship.vy += ty * THRUST_POWER;
  clampSpeed(ship, MAX_SPEED);

  const bx = -tx, by = -ty;

  for (let i = asteroids.length-1; i >= 0; i--) {
    const a = asteroids[i];
    const dx = a.x - ship.x, dy = a.y - ship.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    if (d < 2) continue;

    const dot = (dx/d)*bx + (dy/d)*by;
    if (dot < 0.15) continue;

    if (d < TAIL_PUSH_RANGE) {
      const power = PUSH_POWER * (1 - d/TAIL_PUSH_RANGE) * dot;
      a.vx += (dx/d)*power;
      a.vy += (dy/d)*power;
      clampSpeed(a, 5);
      a.hitFlash = 8;

      const cross = Math.abs(dx*by - dy*bx);
      if (cross < BULLSEYE_TOL && d < TAIL_KILL_RANGE) {
        spawnExplosion(a.x, a.y, '#f80', 20);
        spawnExplosion(a.x, a.y, '#ff4', 10);
        spawnExplosion(a.x, a.y, '#fff', 6);
        score += Math.round(100 * level);
        asteroids.splice(i, 1);
        updateUI();
        if (asteroids.length === 0) {
          setTimeout(() => initLevel(level+1), 1200);
        }
      }
    }
  }
}

// ── Update ─────────────────────────────────────────────
function update() {
  if (!gameRunning) return;

  const rotL = keys['ArrowLeft'] || keys['a'] || keys['A'];
  const rotR = keys['ArrowRight'] || keys['d'] || keys['D'];
  const thrusting = keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'];
  const touchRot = touchLeft ? touchRotDir : 0;

  if ((rotL || touchRot < 0) && !shipDead) ship.angle -= ROTATION_SPEED;
  if ((rotR || touchRot > 0) && !shipDead) ship.angle += ROTATION_SPEED;
  ship.thrusting = (thrusting || touchRight) && !shipDead;

  if (ship.thrusting) {
    applyThrust();
    if (Math.random() < 0.7) spawnTailParticle(ship);
  }

  if (!shipDead) {
    if (!driftMode) { ship.vx *= FRICTION; ship.vy *= FRICTION; }
    ship.x += ship.vx; ship.y += ship.vy;
    bounce(ship, SHIP_SIZE*0.7);
  }

  for (const a of asteroids) {
    a.x += a.vx; a.y += a.vy;
    bounce(a, a.r);
    if (a.hitFlash > 0) a.hitFlash--;
  }

  for (let i=0; i<asteroids.length; i++) {
    for (let j=i+1; j<asteroids.length; j++) {
      if (dist(asteroids[i], asteroids[j]) < asteroids[i].r + asteroids[j].r) {
        asteroidBounce(asteroids[i], asteroids[j]);
      }
    }
  }

  if (!shipDead) {
    for (const a of asteroids) {
      if (dist(ship, a) < SHIP_SIZE*0.75 + a.r*0.75) {
        killShip(); break;
      }
    }
  }

  if (shipDead) {
    respawnTimer--;
    if (respawnTimer <= 0) {
      if (lives <= 0) gameOver();
      else { ship = makeShip(); shipDead = false; }
    }
  }

  for (let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function killShip() {
  spawnExplosion(ship.x, ship.y, '#f40', 20);
  spawnExplosion(ship.x, ship.y, '#ff0', 10);
  lives--;
  shipDead = true;
  respawnTimer = RESPAWN_DELAY;
  updateUI();
}

function gameOver() {
  gameRunning = false;
  const overlay = document.getElementById('overlay');
  overlay.querySelector('h1').innerHTML = 'GAME<br>OVER';
  overlay.querySelector('.sub').innerHTML = `SCORE: ${score}<br>LEVEL: ${level}`;
  overlay.querySelector('.hint').innerHTML = 'TAP TO PLAY AGAIN';
  document.getElementById('startBtn').textContent = 'RETRY';
  overlay.style.display = 'flex';
  ship = null;
}

function updateUI() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('levelVal').textContent = level;
  document.getElementById('livesVal').textContent = Array(Math.max(0,lives)).fill('★').join(' ') || '—';
}

// ── Draw ───────────────────────────────────────────────
function drawStars() {
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x%W, s.y%H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,220,180,${s.b*0.7})`;
    ctx.fill();
  }
}

function drawShip() {
  if (shipDead || !ship) return;
  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(ship.angle);

  if (ship.thrusting) {
    const tailDir = Math.PI;
    const grad = ctx.createLinearGradient(0, 0, Math.cos(tailDir)*TAIL_LENGTH, Math.sin(tailDir)*TAIL_LENGTH);
    grad.addColorStop(0, 'rgba(255,255,180,0.95)');
    grad.addColorStop(0.08, 'rgba(255,160,0,0.85)');
    grad.addColorStop(0.35, 'rgba(255,80,0,0.55)');
    grad.addColorStop(0.7, 'rgba(200,30,0,0.25)');
    grad.addColorStop(1, 'rgba(100,0,0,0)');

    const tipW = 3.5;
    const baseX = Math.cos(tailDir)*TAIL_LENGTH;
    const baseY = Math.sin(tailDir)*TAIL_LENGTH;
    const perpX = -Math.sin(tailDir);
    const perpY = Math.cos(tailDir);

    ctx.beginPath();
    ctx.moveTo(-SHIP_SIZE*0.4, -tipW*0.4);
    ctx.lineTo(baseX + perpX*tipW*0.1, baseY + perpY*tipW*0.1);
    ctx.lineTo(baseX - perpX*tipW*0.1, baseY - perpY*tipW*0.1);
    ctx.lineTo(-SHIP_SIZE*0.4, tipW*0.4);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-SHIP_SIZE*0.3, 0);
    ctx.lineTo(baseX * 0.6, 0);
    ctx.strokeStyle = 'rgba(255,255,200,0.6)';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff8';
    ctx.stroke();
  }

  ctx.shadowBlur = 14;
  ctx.shadowColor = '#f80';
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.moveTo(SHIP_SIZE, 0);
  ctx.lineTo(-SHIP_SIZE*0.7, -SHIP_SIZE*0.65);
  ctx.lineTo(-SHIP_SIZE*0.3, 0);
  ctx.lineTo(-SHIP_SIZE*0.7, SHIP_SIZE*0.65);
  ctx.closePath();
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,130,0,0.07)';
  ctx.fill();

  ctx.restore();
}

function drawTailAimLine() {
  if (!ship || shipDead || !ship.thrusting) return;
  const bx = -Math.cos(ship.angle), by = -Math.sin(ship.angle);
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 1;
  ctx.setLineDash([5, 9]);
  ctx.beginPath();
  ctx.moveTo(ship.x, ship.y);
  ctx.lineTo(ship.x + bx*(TAIL_LENGTH*1.1), ship.y + by*(TAIL_LENGTH*1.1));
  ctx.stroke();
  ctx.restore();
}

function drawAsteroids() {
  for (const a of asteroids) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.shadowBlur = a.hitFlash > 0 ? 22 : 8;
    ctx.shadowColor = a.hitFlash > 0 ? '#f80' : '#876';
    ctx.strokeStyle = a.hitFlash > 0 ? '#ff8' : '#a97';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(a.verts[0].x, a.verts[0].y);
    for (let i=1; i<a.verts.length; i++) ctx.lineTo(a.verts[i].x, a.verts[i].y);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = a.hitFlash > 0 ? 'rgba(255,160,0,0.08)' : 'rgba(180,120,80,0.05)';
    ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 8;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*alpha, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  }
}

function drawTouchZones() {
  ctx.save();
  if (touchLeft) { ctx.globalAlpha = 0.05; ctx.fillStyle = '#f80'; ctx.fillRect(0,0,W/2,H); }
  if (touchRight) { ctx.globalAlpha = 0.07; ctx.fillStyle = '#ff4'; ctx.fillRect(W/2,0,W/2,H); }
  ctx.restore();
}

function loop() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#080400';
  ctx.fillRect(0,0,W,H);
  drawStars();
  drawTouchZones();
  drawTailAimLine();
  drawAsteroids();
  drawParticles();
  if (ship) drawShip();
  update();
  if (gameRunning) requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────────────
window.addEventListener('keydown', e => { keys[e.key]=true; if(e.key===' ') e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.key]=false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    touches[t.identifier] = { x: t.clientX, startX: t.clientX, side: t.clientX < W/2 ? 'left' : 'right' };
    if (t.clientX < W/2) touchLeft = true;
    else touchRight = true;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const td = touches[t.identifier];
    if (td && td.side === 'left') {
      const dx = t.clientX - td.startX;
      touchRotDir = dx > 10 ? 1 : dx < -10 ? -1 : 0;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const td = touches[t.identifier];
    if (td) {
      if (td.side==='left') { touchLeft=false; touchRotDir=0; }
      if (td.side==='right') touchRight=false;
      delete touches[t.identifier];
    }
  }
  let hasLeft=false, hasRight=false;
  for (const id in touches) {
    if (touches[id].side==='left') hasLeft=true;
    if (touches[id].side==='right') hasRight=true;
  }
  touchLeft=hasLeft; touchRight=hasRight;
  if (!hasLeft) touchRotDir=0;
}, { passive: false });

// ── Idle loop ──────────────────────────────────────────
initStars();
(function idleLoop() {
  if (gameRunning) return;
  ctx.fillStyle='#080400';
  ctx.fillRect(0,0,W,H);
  drawStars();
  requestAnimationFrame(idleLoop);
})();
</script>
</body>
</html>
